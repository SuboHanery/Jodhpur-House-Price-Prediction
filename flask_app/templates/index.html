{% extends "base.html" %}

{% block content %}
<main class="split-layout">
    <!-- LEFT PANEL: INPUT FORM -->
    <section class="panel glass form-panel">
        <h1 class="panel-title">Property Details</h1>
        <p class="panel-subtitle">Enter the specifications of the property to get a real-time market estimation powered by Random Forest.</p>
        
        <form id="predictionForm">
            <div class="input-grid">
                <div class="input-group">
                    <label for="area_name">Location in Jodhpur</label>
                    <div class="select-wrapper">
                        <select id="area_name" required>
                            <option value="" disabled selected>Select an area</option>
                            {% for area in areas %}
                                <option value="{{ area }}">{{ area }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="area_size">Built-up Area (Sq Ft)</label>
                    <input type="number" id="area_size" placeholder="e.g. 1500" required min="100">
                </div>

                <div class="input-group">
                    <label for="bhk">Bedrooms (BHK)</label>
                    <div class="select-wrapper">
                        <select id="bhk" required>
                            <option value="" disabled selected>Select BHK</option>
                            <option value="1">1 BHK</option>
                            <option value="2">2 BHK</option>
                            <option value="3">3 BHK</option>
                            <option value="4">4 BHK</option>
                            <option value="5">5 BHK</option>
                            <option value="6">6+ BHK</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="bathrooms">Bathrooms</label>
                    <div class="select-wrapper">
                        <select id="bathrooms" required>
                            <option value="" disabled selected>Select Bathrooms</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="balconies">Balconies</label>
                    <div class="select-wrapper">
                        <select id="balconies" required>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3+</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="property_age">Property Age (Years)</label>
                    <input type="number" id="property_age" value="0" min="0">
                </div>
            </div>

            <div class="amenities-section">
                <label class="section-label">Premium Amenities</label>
                <div class="amenities-grid">
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="gym">
                        <span class="checkbox-box"></span>
                        <span>Gym</span>
                    </label>
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="swimming_pool">
                        <span class="checkbox-box"></span>
                        <span>Pool</span>
                    </label>
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="park">
                        <span class="checkbox-box"></span>
                        <span>Park</span>
                    </label>
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="security">
                        <span class="checkbox-box"></span>
                        <span>Security</span>
                    </label>
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="parking">
                        <span class="checkbox-box"></span>
                        <span>Parking</span>
                    </label>
                    <label class="amenity-checkbox">
                        <input type="checkbox" id="hospital">
                        <span class="checkbox-box"></span>
                        <span>Hospital Nearby</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-predict" id="predictBtn">
                <span class="btn-text">Generate AI Prediction</span>
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </section>

    <!-- RIGHT PANEL: RESULTS -->
    <section class="panel glass result-panel">
        <div class="result-content" id="resultContent">
            <div class="empty-state">
                <div class="pulse-ring"></div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <p>Awaiting Property Details</p>
            </div>
        </div>
    </section>
</main>
{% endblock %}
